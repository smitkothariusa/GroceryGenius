<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroceryGenius - AI Recipe Assistant</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="AI-powered grocery assistant that turns ingredients into recipes and smart shopping lists">
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="GroceryGenius">
    
    <!-- Manifest -->
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="GroceryGenius" />
    <link rel="manifest" href="/site.webmanifest" />
    
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- The service worker (public/service-worker.js) is a hand-rolled
         cache-first-forever implementation with no cache-busting: it serves
         index.html from cache indefinitely, so anyone who had it installed
         before registration was disabled below keeps seeing stale deploys
         until they hard-refresh. Actively unregister it (and its caches)
         for every visitor instead of just no longer registering new ones. -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then((registrations) => {
                registrations.forEach((registration) => registration.unregister());
            });
        }
        if (window.caches) {
            caches.keys().then((names) => {
                names.forEach((name) => caches.delete(name));
            });
        }
    </script>
</body>
</html>
