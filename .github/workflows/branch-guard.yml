name: Branch Guard

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  check-target:
    runs-on: ubuntu-latest
    steps:
      - name: Block direct feature branches targeting main
        if: github.base_ref == 'main' && !startsWith(github.head_ref, 'dev') && github.head_ref != 'dev'
        run: |
          echo "❌ PRs to main must come from the 'dev' branch only."
          echo "Current source branch: ${{ github.head_ref }}"
          echo "Please retarget your PR to 'dev' first."
          exit 1

      - name: Confirm PR is valid
        run: |
          echo "✅ Branch target check passed."
          echo "Source: ${{ github.head_ref }} → Target: ${{ github.base_ref }}"
