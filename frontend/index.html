<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroceryGenius - AI Recipe Assistant</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="AI-powered grocery assistant that turns ingredients into recipes and smart shopping lists">
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="GroceryGenius">
    
    <!-- Manifest -->
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="GroceryGenius" />
    <link rel="manifest" href="/site.webmanifest" />
    
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- public/service-worker.js used to be a hand-rolled cache-first-forever
         implementation with no cache-busting. It has since been replaced by
         a self-unregistering "kill switch" (see that file) that cleans up
         any lingering legacy install on its own via the browser's normal SW
         update check — no help needed from here.

         This script used to unregister *every* registration and clear *all*
         caches on *every* page load, unconditionally. That was fine while
         the app registered no service worker of its own, but main.tsx now
         registers a legitimate one (virtual:pwa-register, scoped to
         /sw.js) for PWA installability. Nuking every registration on every
         load was fighting that: unregister -> re-register -> unregister on
         the next load, in an unbounded loop that manifested as the page
         reloading itself continuously and — because that generation of
         re-renders steals input focus — the on-screen keyboard dismissing
         mid-type on the sign-in form.

         Scope this to the legacy script by URL so it only ever touches the
         old /service-worker.js registration and leaves /sw.js alone. -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then((registrations) => {
                registrations
                    .filter((registration) => {
                        const url = registration.active?.scriptURL
                            || registration.installing?.scriptURL
                            || registration.waiting?.scriptURL
                            || '';
                        return url.includes('/service-worker.js');
                    })
                    .forEach((registration) => registration.unregister());
            });
        }
    </script>
</body>
</html>
